<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="How I Fell For You — An interactive romantic story" />
  <title>How I Fell For You 💖</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== Floating Hearts Background ===== -->
  <div class="hearts-container" id="hearts-container"></div>

  <!-- ===== Main Story Card ===== -->
  <div class="story-card fade-in" id="story-card">
    <h1 class="story-title">How I Fell For You <span class="heart-icon">💗</span></h1>
    <p class="story-text" id="story-text"></p>
    <div class="reveal-text" id="reveal-text"></div>
    <div class="buttons-container" id="buttons-container"></div>
  </div>

  <!-- ===== Confetti / Celebration Canvas ===== -->
  <canvas id="confetti-canvas"></canvas>

  <!-- ===== Music Toggle ===== -->
  <button class="music-toggle" id="music-toggle" title="Toggle music">🎵</button>

  <!-- ===== Background Audio (user can add their own mp3) ===== -->
  <audio id="bg-music" loop preload="auto" muted>
    <source src="assets/bg-music.mp3" type="audio/mpeg" />
  </audio>

  <!-- ===== PDF Generation Libraries ===== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- ===== Main Script ===== -->
  <script src="script.js"></script>
</body>
</html>
